<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile · Instagram</title>
    <meta name="description" content="Responsive Instagram profile screen built with pure HTML and CSS using Flexbox and CSS Grid." />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- ===== Desktop / tablet sidebar ===== -->
      <aside class="sidebar" aria-label="Primary">
        <div class="sidebar__brand"><span class="full">Instagram</span><span class="short">IG</span></div>
        <nav class="sidebar__nav">
          <a class="nav-item" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
            <span class="label">Home</span>
          </a>
          <a class="nav-item" href="explore.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
            <span class="label">Search</span>
          </a>
          <a class="nav-item" href="explore.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15 9 22 9 16.5 13.5 18.5 21 12 16.5 5.5 21 7.5 13.5 2 9 9 9"/></svg>
            <span class="label">Explore</span>
          </a>
          <a class="nav-item" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M10 9l5 3-5 3z"/></svg>
            <span class="label">Reels</span>
          </a>
          <a class="nav-item" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-9 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.2A8.5 8.5 0 1 1 21 11.5z"/></svg>
            <span class="label">Messages</span>
          </a>
          <a class="nav-item" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/></svg>
            <span class="label">Notifications</span>
          </a>
          <a class="nav-item" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="5"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            <span class="label">Create</span>
          </a>
          <a class="nav-item active" href="profile.html" aria-current="page">
            <span class="me-dot g1"></span>
            <span class="label">Profile</span>
          </a>
        </nav>
      </aside>

      <!-- ===== Mobile top bar ===== -->
      <header class="topbar">
        <h1 class="topbar__title">jane_doe</h1>
        <div class="topbar__actions">
          <button class="icon-btn" aria-label="New post">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="4"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </button>
          <button class="icon-btn has-badge" aria-label="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
          </button>
        </div>
      </header>

      <!-- ===== Main content ===== -->
      <main class="main">
        <div class="container container--wide">
          <!-- Profile header -->
          <section class="profile-head" aria-label="Profile summary">
            <div class="profile-avatar-wrap">
              <div class="avatar profile-avatar g1"></div>
              <span class="add-badge" aria-hidden="true">+</span>
            </div>
            <div class="profile-id">
              <div class="profile-id__top">
                <span class="uname">jane_doe</span>
                <div class="profile-actions">
                  <button class="btn btn--primary">Follow</button>
                  <button class="btn">Message</button>
                  <button class="btn" aria-label="More suggestions">▾</button>
                </div>
              </div>
              <dl class="profile-stats">
                <div class="stat"><dd class="num">128</dd><dt class="label">posts</dt></div>
                <div class="stat"><dd class="num">8,540</dd><dt class="label">followers</dt></div>
                <div class="stat"><dd class="num">312</dd><dt class="label">following</dt></div>
              </dl>
            </div>
          </section>

          <!-- Bio -->
          <section class="profile-bio">
            <p class="name">Jane Doe</p>
            <p class="handle">Digital Creator</p>
            <p class="desc">Designing clean interfaces &amp; chasing pink sunsets.<br />Flexbox + CSS Grid enthusiast.</p>
          </section>

          <!-- Highlights -->
          <section class="highlights" aria-label="Story highlights">
            <div class="highlight"><div class="bubble add" aria-hidden="true">+</div><span>New</span></div>
            <div class="highlight"><div class="bubble g2"></div><span>Travel</span></div>
            <div class="highlight"><div class="bubble g3"></div><span>Design</span></div>
            <div class="highlight"><div class="bubble g4"></div><span>Food</span></div>
            <div class="highlight"><div class="bubble g5"></div><span>Daily</span></div>
          </section>

          <!-- Tabs -->
          <nav class="tabbar" aria-label="Profile content tabs">
            <button class="active" aria-label="Posts grid">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
            </button>
            <button aria-label="Tagged photos">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v12H7l-3 3z"/><circle cx="12" cy="10" r="2.5"/></svg>
            </button>
          </nav>

          <!-- Posts grid -->
          <section class="post-grid" aria-label="User posts">
            <div class="tile g1"></div><div class="tile g2"></div><div class="tile g3"></div>
            <div class="tile g4"></div><div class="tile g5"></div><div class="tile g2"></div>
            <div class="tile g3"></div><div class="tile g1"></div><div class="tile g4"></div>
          </section>
        </div>
      </main>

      <!-- ===== Mobile bottom nav ===== -->
      <nav class="bottomnav" aria-label="Primary">
        <a href="index.html" aria-label="Home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></a>
        <a href="explore.html" aria-label="Search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></a>
        <a href="index.html" aria-label="Create"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="5"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></a>
        <a href="index.html" aria-label="Activity"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/></svg></a>
        <a href="profile.html" class="active" aria-current="page" aria-label="Profile"><span class="me g1"></span></a>
      </nav>
    </div>
  </body>
</html>
