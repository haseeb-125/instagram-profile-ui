<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explore · Instagram</title>
    <meta name="description" content="Responsive Instagram explore screen built with pure HTML and CSS using a masonry CSS Grid." />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- ===== Desktop / tablet sidebar ===== -->
      <aside class="sidebar" aria-label="Primary">
        <div class="sidebar__brand"><span class="full">Instagram</span><span class="short">IG</span></div>
        <nav class="sidebar__nav">
          <a class="nav-item" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
            <span class="label">Home</span>
          </a>
          <a class="nav-item" href="explore.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
            <span class="label">Search</span>
          </a>
          <a class="nav-item active" href="explore.html" aria-current="page">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15 9 22 9 16.5 13.5 18.5 21 12 16.5 5.5 21 7.5 13.5 2 9 9 9"/></svg>
            <span class="label">Explore</span>
          </a>
          <a class="nav-item" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M10 9l5 3-5 3z"/></svg>
            <span class="label">Reels</span>
          </a>
          <a class="nav-item" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-9 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.2A8.5 8.5 0 1 1 21 11.5z"/></svg>
            <span class="label">Messages</span>
          </a>
          <a class="nav-item" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/></svg>
            <span class="label">Notifications</span>
          </a>
          <a class="nav-item" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="5"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            <span class="label">Create</span>
          </a>
          <a class="nav-item" href="profile.html">
            <span class="me-dot g1"></span>
            <span class="label">Profile</span>
          </a>
        </nav>
      </aside>

      <!-- ===== Mobile top bar ===== -->
      <header class="topbar">
        <span class="topbar__title">Explore</span>
        <div class="topbar__actions">
          <button class="icon-btn" aria-label="Map">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
          </button>
        </div>
      </header>

      <!-- ===== Main content ===== -->
      <main class="main">
        <div class="container container--wide">
          <!-- Search -->
          <label class="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
            <span class="sr-only">Search</span>
            <input type="search" placeholder="Search" />
          </label>

          <!-- Filter chips -->
          <div class="chips" role="tablist" aria-label="Explore categories">
            <button class="chip active">For you</button>
            <button class="chip">Travel</button>
            <button class="chip">Design</button>
            <button class="chip">Food</button>
            <button class="chip">Nature</button>
            <button class="chip">Art</button>
          </div>

          <!-- Masonry-style grid -->
          <section class="explore-grid" aria-label="Explore posts">
            <div class="tile g1 wide"></div>
            <div class="tile g3"></div>
            <div class="tile g2 tall"></div>
            <div class="tile g4"></div>
            <div class="tile g5"></div>
            <div class="tile g1"></div>
            <div class="tile g3 wide"></div>
            <div class="tile g2"></div>
            <div class="tile g4 tall"></div>
            <div class="tile g5"></div>
            <div class="tile g1"></div>
            <div class="tile g2"></div>
            <div class="tile g3"></div>
            <div class="tile g5 wide"></div>
            <div class="tile g4"></div>
          </section>
        </div>
      </main>

      <!-- ===== Mobile bottom nav ===== -->
      <nav class="bottomnav" aria-label="Primary">
        <a href="index.html" aria-label="Home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></a>
        <a href="explore.html" class="active" aria-current="page" aria-label="Search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></a>
        <a href="index.html" aria-label="Create"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="5"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></a>
        <a href="index.html" aria-label="Activity"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/></svg></a>
        <a href="profile.html" aria-label="Profile"><span class="me g1"></span></a>
      </nav>
    </div>
  </body>
</html>
